<div class="page">
  <div class="card p-3 mb-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4>Daftar Siswa</h4>
      <button class="btn btn-primary" onclick="loadPage('siswa-form')">
        + Tambah Siswa
      </button>
    </div>

    <div class="d-flex gap-2 mb-3">
      <!-- SEARCH -->
      <input
        id="searchSiswa"
        class="form-control"
        placeholder="Cari siswa..."
        oninput="handleSearch()"
      />

      <!-- FILTER -->
      <select
        id="filterKelas"
        class="form-select"
        onchange="handleFilterChange()"
      >
        <option value="">Semua Kelas</option>
        <option value="1A">1A</option>
        <option value="1B">1B</option>
        <option value="1C">1C</option>
        <option value="2A">2A</option>
        <option value="2B">2B</option>
        <option value="2C">2C</option>
        <option value="3A">3A</option>
        <option value="3B">3B</option>
        <option value="3C">3C</option>
        <option value="4A">4A</option>
        <option value="4B">4B</option>
        <option value="4C">4C</option>
        <option value="5A">5A</option>
        <option value="5B">5B</option>
        <option value="5C">5C</option>
        <option value="6A">6A</option>
        <option value="6B">6B</option>
        <option value="6C">6C</option>
      </select>
    </div>

    <!-- GRID (WAJIB SESUAI JS) -->
    <div id="gridSiswa" class="row g-3"></div>

    <div class="d-flex justify-content-between mt-3">
      <button class="btn btn-sm btn-primary" onclick="prevPageSiswa()">
        ◀
      </button>
      <span id="pageInfoSiswa"></span>
      <button class="btn btn-sm btn-primary" onclick="nextPageSiswa()">
        ▶
      </button>
    </div>
  </div>
</div>
